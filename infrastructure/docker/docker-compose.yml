services:
  nexus-api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../.env.docker.example
    environment:
      CLOUDREVE_BASE_URL: ${CLOUDREVE_BASE_URL:-http://host.docker.internal:5212}
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin:admin123@kg-postgres:5432/smart_building}
      REDIS_URL: ${REDIS_URL:-redis://kg-redis:6379/0}
      NEO4J_URI: ${NEO4J_URI:-bolt://kg-neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-admin123}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-milvus}
      MILVUS_HOST: ${MILVUS_HOST:-kg-milvus}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://kg-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "8000:8000"
    networks:
      - kg-network

  nexus-worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: ["python", "-m", "nexus.worker"]
    env_file:
      - ../../.env.docker.example
    environment:
      CLOUDREVE_BASE_URL: ${CLOUDREVE_BASE_URL:-http://host.docker.internal:5212}
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin:admin123@kg-postgres:5432/smart_building}
      REDIS_URL: ${REDIS_URL:-redis://kg-redis:6379/0}
      NEO4J_URI: ${NEO4J_URI:-bolt://kg-neo4j:7687}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-milvus}
      MILVUS_HOST: ${MILVUS_HOST:-kg-milvus}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
    networks:
      - kg-network

  nexus-web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXUS_API_PROXY_TARGET: http://nexus-api:8000
    ports:
      - "5173:5173"
    depends_on:
      - nexus-api
    networks:
      - kg-network

networks:
  kg-network:
    external: true
