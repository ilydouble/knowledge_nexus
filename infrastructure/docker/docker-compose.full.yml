services:
  cloudreve:
    image: cloudreve/cloudreve:latest
    ports:
      - "5212:5212"
    volumes:
      - cloudreve_data:/cloudreve/data
      - cloudreve_uploads:/cloudreve/uploads

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/nexuspassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  nexus-api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      CLOUDREVE_BASE_URL: http://cloudreve:5212
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      - cloudreve
      - postgres
      - redis
      - neo4j
      - qdrant

  nexus-worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: ["python", "-m", "nexus.worker"]
    environment:
      CLOUDREVE_BASE_URL: http://cloudreve:5212
    depends_on:
      - cloudreve
      - redis

  nexus-web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXUS_API_PROXY_TARGET: http://nexus-api:8000
    ports:
      - "5173:5173"
    depends_on:
      - nexus-api

volumes:
  cloudreve_data:
  cloudreve_uploads:
  postgres_data:
  neo4j_data:
  qdrant_data:
