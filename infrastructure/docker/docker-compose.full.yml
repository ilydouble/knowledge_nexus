services:
  cloudreve:
    image: cloudreve/cloudreve:latest
    ports:
      - "5212:5212"
    volumes:
      - cloudreve_data:/cloudreve/data
      - cloudreve_uploads:/cloudreve/uploads

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/nexuspassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  milvus:
    image: milvusdb/milvus:v2.3-latest
    command: milvus run standalone
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus

  nexus-api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      CLOUDREVE_BASE_URL: http://cloudreve:5212
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: knowledge-nexus
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      VECTOR_BACKEND: milvus
    ports:
      - "8000:8000"
    depends_on:
      - cloudreve
      - postgres
      - redis
      - neo4j
      - minio
      - milvus

  nexus-web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXUS_API_PROXY_TARGET: http://nexus-api:8000
    ports:
      - "5173:5173"
    depends_on:
      - nexus-api

volumes:
  cloudreve_data:
  cloudreve_uploads:
  postgres_data:
  neo4j_data:
  minio_data:
  milvus_data:
