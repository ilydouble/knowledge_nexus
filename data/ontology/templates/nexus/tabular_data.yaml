schema: nexus-v1
name: tabular_data
type: graph
version: "1.0"
tags: [data, tabular, excel, csv, schema]
language: [en, zh]
description:
  en: "Excel workbooks, CSV files, structured tables — extract schema (sheets, fields, types), not row data."
  zh: "Excel工作簿、CSV文件、结构化表格 — 提取模式（工作表、字段、类型），不提取行数据。"

concepts:
  - type: Dataset
    description: "The overall workbook or file (one entity per file)."
  - type: Sheet
    description: "A named worksheet within the workbook."
  - type: Field
    description: "A column header / field name (one entity per column)."
  - type: DataType
    description: "An inferred data type for a field (e.g. 'Date', 'Currency', 'Boolean'). Only when clearly determinable."

relations:
  - relation: HAS_SHEET
    source: Dataset
    target: Sheet
    description: "Workbook contains this sheet"
  - relation: HAS_FIELD
    source: Sheet
    target: Field
    description: "Sheet contains this column/field"
  - relation: HAS_TYPE
    source: Field
    target: DataType
    description: "Field stores values of this data type"

instructions: |
  Create ONE Dataset entity for the whole file.
  Create ONE Field entity per column — do not merge or skip columns.
  Only add DataType entities when the type is clearly determinable from column name or sample values.
  Do not enumerate or describe individual row values.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
