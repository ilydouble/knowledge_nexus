schema: nexus-v1
name: report
type: graph
version: "1.0"
tags: [business, report, kpi, project-status]
language: [en, zh]
description:
  en: "Business reports, project status updates, quarterly reviews — extract metrics, risks, milestones."
  zh: "业务报告、项目状态更新、季度回顾 — 提取指标、风险、里程碑。"

concepts:
  - type: Metric
    description: "A KPI or measurable indicator WITH its value and unit (e.g. '月活跃用户 12万', '转化率 3.2%'). No value = no entity."
  - type: Project
    description: "A named project or business initiative being reported on."
  - type: Team
    description: "A named team or department responsible for a project or metric."
  - type: Risk
    description: "A named risk or threat with specific description (e.g. '供应链延迟风险', 'key person dependency')."
  - type: Milestone
    description: "A named project milestone or goal (e.g. 'Q2 Beta Launch', '10万日活目标')."
  - type: Achievement
    description: "A completed goal or positive outcome explicitly stated (e.g. '提前完成 MVP')."
  - type: Recommendation
    description: "An explicit actionable suggestion in the report (e.g. '建议扩充客服团队')."

relations:
  - relation: OWNED_BY
    source: Project
    target: Team
    description: "Project is under this team's responsibility"
  - relation: MEASURED_BY
    source: Project
    target: Metric
    description: "Project performance tracked by this metric"
  - relation: HAS_RISK
    source: Project
    target: Risk
    description: "Project faces this risk"
  - relation: TARGETS
    source: Project
    target: Milestone
    description: "Project is working toward this milestone"
  - relation: ACHIEVED
    source: Project
    target: Achievement
    description: "Project completed this goal"
  - relation: RECOMMENDS
    source: Report
    target: Recommendation
    description: "Report explicitly recommends this action"

instructions: |
  Prioritize concrete numbers — Metrics without values should not be extracted.
  Risks must have specific descriptions, not generic 'schedule risk'.
  Distinguish between current Achievements (done) and future Milestones (planned).
  Recommendations must be explicitly stated in the report, not inferred.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
