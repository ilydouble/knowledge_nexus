schema: nexus-v1
name: financial_report
type: graph
version: "1.0"
tags: [finance, earnings, ownership, risk, corporate]
language: [en, zh]
description:
  en: "Financial reports, annual reports, IPO prospectuses, earnings call transcripts — focus on corporate structure, ownership, events, and risk."
  zh: "财务报告、年报、招股说明书、财报电话会议记录 — 聚焦公司结构、股权、事件和风险。"

concepts:
  - type: Company
    description: "Named corporate entity (e.g. 'Apple Inc.', '腾讯控股'). NOT generic 'company' references."
  - type: Shareholder
    description: "Named shareholder or investor entity with ownership stake (e.g. 'BlackRock', '马化腾')."
  - type: FinancialMetric
    description: "Quantitative measure WITH value (e.g. 'revenue $12.3B', 'EPS $2.45', '净利润增长15%')."
  - type: CorporateEvent
    description: "Material corporate event (e.g. 'Q3 2024 earnings release', 'Series B funding', 'IPO listing')."
  - type: RiskFactor
    description: "Named risk category or specific risk exposure (e.g. 'regulatory risk', '汇率风险', 'supply chain disruption')."
  - type: MarketTheme
    description: "Market trend or sector theme mentioned in analysis (e.g. 'AI adoption', '新能源转型')."
  - type: BusinessSegment
    description: "Named business division or product line (e.g. 'Cloud Computing', '智能硬件业务')."

relations:
  - relation: CONTROLS
    source: Shareholder
    target: Company
    description: "Shareholder holds controlling stake in the company"
  - relation: HOLDS_SHARES_IN
    source: Shareholder
    target: Company
    description: "Shareholder has non-controlling ownership in the company"
  - relation: SUBSIDIARY_OF
    source: Company
    target: Company
    description: "Company is a wholly or majority-owned subsidiary"
  - relation: REPORTS_METRIC
    source: Company
    target: FinancialMetric
    description: "Company disclosed this metric in the filing"
  - relation: EXPERIENCED
    source: Company
    target: CorporateEvent
    description: "Company underwent or announced this event"
  - relation: PRECEDES
    source: CorporateEvent
    target: CorporateEvent
    description: "Event occurred before or triggered the subsequent event"
  - relation: EXPOSED_TO
    source: Company
    target: RiskFactor
    description: "Company faces this risk as identified in the filing"
  - relation: OPERATES_IN
    source: Company
    target: BusinessSegment
    description: "Company has revenue or operations in this segment"
  - relation: INFLUENCES
    source: MarketTheme
    target: BusinessSegment
    description: "Market trend materially affects this business segment"

instructions: |
  Focus on: ownership structure tables, financial highlights, MD&A section, risk factors section,
  corporate events (acquisitions, dividends, regulatory actions), earnings comparisons.
  FinancialMetric MUST include the numeric value — omit if only a label with no number.
  Shareholding percentages should be noted in relation descriptions when available.
  Do NOT extract generic sector names or countries as entities unless they are named business segments.
  Do NOT invent causal links between events — only extract what is explicitly stated.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
