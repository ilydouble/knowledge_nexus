schema: nexus-v1
name: contract
type: graph
version: "1.0"
tags: [legal, contract, obligations, rights]
language: [en, zh]
description:
  en: "Contracts, agreements, MOUs, NDAs — extract parties, obligations, rights, penalties, and key dates."
  zh: "合同、协议、备忘录、保密协议 — 提取各方、义务、权利、违约金和关键日期。"

concepts:
  - type: Party
    description: "A named contracting party with full name (e.g. '甲方：北京科技有限公司', 'Acme Corp (Party A)'). NOT generic 'buyer/seller'."
  - type: Obligation
    description: "A specific duty one party MUST perform (indicated by 'shall', 'must', '应当', '须'). Paraphrase concisely."
  - type: Right
    description: "A specific entitlement one party MAY exercise (indicated by 'may', 'is entitled to', '有权'). Paraphrase concisely."
  - type: Penalty
    description: "A consequence for breach with amount if stated (e.g. '违约金10万元', 'liquidated damages of $5,000')."
  - type: Jurisdiction
    description: "Governing law or dispute resolution venue (e.g. '中国法律管辖', 'arbitration in Hong Kong')."
  - type: KeyDate
    description: "A critical date: effective date, expiry, payment due (e.g. '合同有效期2年', '2024-06-01生效')."
  - type: Subject
    description: "The main item, service, or intellectual property the contract covers."

relations:
  - relation: PARTY_TO
    source: Party
    target: Contract
    description: "Party is a signatory to the contract"
  - relation: OBLIGATED_BY
    source: Party
    target: Obligation
    description: "Party must fulfill this obligation"
  - relation: ENTITLED_TO
    source: Party
    target: Right
    description: "Party holds this right"
  - relation: PENALIZED_BY
    source: Party
    target: Penalty
    description: "Party faces this penalty for breach"
  - relation: GOVERNED_BY
    source: Contract
    target: Jurisdiction
    description: "Contract is subject to this jurisdiction"
  - relation: EFFECTIVE_ON
    source: Contract
    target: KeyDate
    description: "Contract milestone date"
  - relation: COVERS
    source: Contract
    target: Subject
    description: "Contract governs this subject matter"

instructions: |
  Extract both parties with their full legal names.
  Identify obligations (shall/must/应当) separately from rights (may/有权).
  Include specific penalty amounts when stated.
  Capture all key dates. Do NOT extract boilerplate legal language as entities.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
