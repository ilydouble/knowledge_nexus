schema: nexus-v1
name: industry_manual
type: graph
version: "1.0"
tags: [industry, equipment, sop, safety, maintenance, emergency]
language: [en, zh]
description:
  en: "Industrial manuals — equipment topology, SOPs, failure analysis reports, safety management documents, emergency response plans."
  zh: "工业手册 — 设备拓扑图、SOP操作手册、故障分析报告、安全管理文件、应急预案。"

concepts:
  - type: Equipment
    description: "Named piece of equipment or system component (e.g. 'PLC Controller A', '变频器VFD-01'). Include model/ID if given."
  - type: OperationStep
    description: "Named operation step or task in a procedure (e.g. 'Start Pump P-101', '关闭主阀门'). Use action-oriented names."
  - type: Failure
    description: "Named failure mode, fault, or symptom (e.g. 'motor overheating', '压力异常升高'). NOT generic 'failure'."
  - type: Hazard
    description: "Named safety hazard or risk source (e.g. 'high-voltage exposure', '可燃气体泄漏')."
  - type: ControlMeasure
    description: "Named safety or quality control action (e.g. 'lockout/tagout', '安全阀泄压', 'pressure interlock')."
  - type: ResponseAction
    description: "Named emergency response step (e.g. 'Evacuate Zone B', '启动应急预案', 'notify fire brigade')."
  - type: Role
    description: "Named job role or team responsible for an action (e.g. 'Shift Supervisor', '安全员', 'Maintenance Engineer')."

relations:
  - relation: CONNECTED_TO
    source: Equipment
    target: Equipment
    description: "Equipment is physically or logically connected to another equipment"
  - relation: CONTAINS
    source: Equipment
    target: Equipment
    description: "Equipment assembly contains this sub-component"
  - relation: CONTROLS
    source: Equipment
    target: Equipment
    description: "Equipment controls or actuates the target equipment"
  - relation: FOLLOWED_BY
    source: OperationStep
    target: OperationStep
    description: "Operation step is directly followed by the next step in sequence"
  - relation: REQUIRES
    source: OperationStep
    target: Equipment
    description: "Step requires this equipment to be in a specific state or used"
  - relation: CAUSED_BY
    source: Failure
    target: Failure
    description: "Failure is caused by or is a root cause of the target failure"
  - relation: RESOLVED_BY
    source: Failure
    target: ControlMeasure
    description: "Failure is corrected by applying this measure"
  - relation: CAUSES_HAZARD
    source: Failure
    target: Hazard
    description: "Failure condition can produce this safety hazard"
  - relation: MITIGATES
    source: ControlMeasure
    target: Hazard
    description: "Control measure reduces or eliminates this hazard"
  - relation: TRIGGERS
    source: Hazard
    target: ResponseAction
    description: "Hazard occurrence triggers this emergency response action"
  - relation: ASSIGNED_TO
    source: ResponseAction
    target: Role
    description: "Response action is the responsibility of this role"

instructions: |
  Focus on: equipment list and wiring/control diagrams, procedure steps with sequence,
  fault-cause-corrective action chains, hazard identification and control tables,
  emergency response triggers and responsible roles.
  Equipment: always include ID/tag number when present (e.g. 'Pump P-101' not just 'pump').
  OperationStep: extract each step with a verb; preserve step sequence via FOLLOWED_BY.
  Failure analysis: extract the full chain — symptom → root cause → corrective measure.
  Do NOT extract abstract safety principles as ControlMeasure — only named, specific actions.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
