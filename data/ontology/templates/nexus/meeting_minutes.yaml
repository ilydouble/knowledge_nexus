schema: nexus-v1
name: meeting_minutes
type: graph
version: "1.0"
tags: [operations, meeting, action-items, decisions]
language: [en, zh]
description:
  en: "Meeting minutes, stand-up notes, retrospectives — extract who does what by when."
  zh: "会议纪要、站会记录、回顾会议 — 提取谁在何时做什么。"

concepts:
  - type: Person
    description: "Named meeting participant (e.g. '张伟', 'Sarah Chen'). NOT generic roles like 'PM'."
  - type: Task
    description: "A specific action item someone must do (e.g. '完成用户调研报告'). Must be actionable and concrete."
  - type: Decision
    description: "A resolution or agreement reached in the meeting (e.g. '确定使用 PostgreSQL 方案')."
  - type: Project
    description: "A named project or workstream discussed in the meeting."
  - type: Deadline
    description: "A specific date or relative time for a task (e.g. '2024-03-15', '下周五'). Must be concrete."
  - type: Issue
    description: "A named problem, blocker, or risk raised during the meeting."

relations:
  - relation: ASSIGNED_TO
    source: Task
    target: Person
    description: "Task is owned by this person"
  - relation: DECIDED_BY
    source: Decision
    target: Person
    description: "Person proposed or approved this decision"
  - relation: DUE_BY
    source: Task
    target: Deadline
    description: "Task must be completed by this deadline"
  - relation: RELATES_TO
    source: Task
    target: Project
    description: "Task belongs to this project"
  - relation: RAISED_BY
    source: Issue
    target: Person
    description: "Person raised this issue"
  - relation: BLOCKS
    source: Issue
    target: Task
    description: "Issue is preventing this task from progressing"

instructions: |
  Focus exclusively on: WHO is doing WHAT by WHEN (action items), decisions made, and issues raised.
  Do NOT extract casual discussion or context as Tasks.
  Tasks must have a clear owner (ASSIGNED_TO required).
  Decisions should be distinct conclusions, not discussion points.
  Only extract Deadlines that are explicitly stated.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
