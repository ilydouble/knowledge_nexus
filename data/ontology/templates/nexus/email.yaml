schema: nexus-v1
name: email
type: graph
version: "1.0"
tags: [communications, email, action-items]
language: [en, zh]
description:
  en: "Email threads, internal messages — identify sender, recipients, requests, deadlines, and attachments."
  zh: "邮件线程、内部消息 — 识别发件人、收件人、请求、截止日期和附件。"

concepts:
  - type: Person
    description: "Named sender or recipient (e.g. '张总', 'john@acme.com → John'). NOT generic 'team' or 'all'."
  - type: Organization
    description: "Named company or team mentioned in the email body."
  - type: Topic
    description: "The main subject matter of the email thread (derived from Subject line or opening)."
  - type: Action
    description: "A specific request or follow-up item (e.g. '请在周五前确认方案', 'please review the attached'). Must be concrete."
  - type: KeyDate
    description: "A deadline or meeting time mentioned (e.g. '3月15日前', 'by EOD Friday')."
  - type: Attachment
    description: "A referenced document or file (e.g. '附件：Q1报告.pdf')."

relations:
  - relation: SENT_BY
    source: Email
    target: Person
    description: "Email sender"
  - relation: SENT_TO
    source: Email
    target: Person
    description: "Email recipient (To/CC)"
  - relation: REQUESTS
    source: Person
    target: Action
    description: "Person is asking for this action"
  - relation: ACTION_BY
    source: Action
    target: KeyDate
    description: "Action should be completed by this date"
  - relation: REFERENCES
    source: Email
    target: Topic
    description: "Email is about this topic"
  - relation: ATTACHES
    source: Email
    target: Attachment
    description: "Email includes this attachment"

instructions: |
  Identify who is asking whom to do what by when.
  Actions must be concrete requests, NOT casual remarks or pleasantries.
  Extract the Topic from the Subject line first, then the opening sentence.
  Only extract Attachments that are explicitly named.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
