schema: nexus-v1
name: general
type: graph
version: "1.0"
tags: [general, fallback]
language: [en, zh]
description:
  en: "General-purpose ontology for unclassified or mixed-content documents."
  zh: "用于未分类或混合内容文档的通用本体。"

concepts:
  - type: Person
    description: "A named individual (e.g. '张伟', 'Alan Turing'). NOT job titles or roles."
  - type: Organization
    description: "A named company, team, or institution (e.g. 'Alibaba', 'MIT'). NOT departments without names."
  - type: Project
    description: "A named project or initiative with a specific purpose."
  - type: Technology
    description: "A named tool, framework, language, or system (e.g. 'Python', 'Kafka')."
  - type: Concept
    description: "A key abstract idea or domain term central to the document."
  - type: Location
    description: "A named geographical place relevant to the content."
  - type: Event
    description: "A named occurrence with a time dimension (e.g. conference, release, incident)."
  - type: Metric
    description: "A measurable indicator with a value (e.g. '99.9% uptime', '2s latency')."

relations:
  - relation: WORKS_AT
    source: Person
    target: Organization
    description: "Person is employed at or affiliated with organization"
  - relation: WORKS_ON
    source: Person
    target: Project
    description: "Person contributes to project"
  - relation: USES
    source: Person
    target: Technology
    description: "Person or project uses a technology"
  - relation: PART_OF
    source: Entity
    target: Entity
    description: "Entity is a sub-component of another"
  - relation: DEPENDS_ON
    source: Entity
    target: Entity
    description: "Entity requires another to function"
  - relation: RELATES_TO
    source: Entity
    target: Entity
    description: "General semantic association when no specific relation fits"
  - relation: LOCATED_IN
    source: Entity
    target: Location
    description: "Entity is physically or legally based in a location"
  - relation: MEASURES
    source: Metric
    target: Entity
    description: "Metric quantifies an aspect of an entity"

instructions: |
  Extract named, specific entities only. Avoid generic terms.
  Prefer concrete nouns over abstract ones.
  Use RELATES_TO only as a last resort when no more specific relation applies.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
