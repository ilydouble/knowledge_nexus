schema: nexus-v1
name: smart_campus
type: graph
version: "1.0"
tags: [smart-campus, building, bms, ems, hvac, iot, fdd, brick, rec]
language: [en, zh]
description:
  en: "Smart campus and smart building graph template — space, equipment, points, energy, safety, maintenance, faults, standards, and agent actions."
  zh: "智慧园区与智能建筑图谱模板 — 提取空间、设备、点位、能耗、安全、运维、故障、标准和智能体动作。"

concepts:
  - type: Campus
    description: "A named campus, park, or facility group."
  - type: Building
    description: "A named building within a campus, including building code or function when provided."
  - type: Floor
    description: "A named floor or level within a building."
  - type: Space
    description: "A named room, area, lab, office, machine room, corridor, or other spatial unit."
  - type: Equipment
    description: "A named physical asset such as chiller, AHU, FCU, VAV, pump, transformer, inverter, distribution box, meter, controller, valve, camera, or access device."
  - type: Point
    description: "A BMS/EMS/IoT point, sensor, meter channel, actuator point, alarm point, or telemetry point with tag name if available."
  - type: System
    description: "A building subsystem such as HVAC, EMS, BMS, fire safety, access control, electrical distribution, water, chilled water, or security."
  - type: Metric
    description: "A measurable indicator with unit or meaning, such as power, voltage, flow, temperature, humidity, pressure, valve opening, EUI, or base load."
  - type: FaultEvent
    description: "A named fault, alarm, abnormal condition, or incident with trigger and scope when available."
  - type: RootCause
    description: "A specific root cause or direct cause of a fault, not a generic explanation."
  - type: WorkOrder
    description: "A maintenance ticket, repair record, inspection record, or operational task."
  - type: Procedure
    description: "A SOP, emergency plan, troubleshooting procedure, or response flow."
  - type: Rule
    description: "A diagnosis, control, safety, or energy rule that can support reasoning."
  - type: Standard
    description: "A named ontology, standard, paper, or reference such as Brick Schema, RealEstateCore, Haystack, ASHRAE, or FDD research."
  - type: Dataset
    description: "A named public or project dataset used for validation, demo, anomaly detection, or FDD experiments."
  - type: Role
    description: "A responsible person, team, vendor, department, or operational role."
  - type: AgentAction
    description: "A graph operation or workflow step that Pi-Agent can perform, such as extract, review, merge, query, diagnose, commit, or create work order."
  - type: GraphWorkspace
    description: "A named graph workspace, project graph, or ontology workspace managed by Pi-Agent and Knowledge OS."
  - type: CandidateBatch
    description: "A governed batch of extracted entity and relation candidates awaiting Pi-Agent or human review."

relations:
  - relation: PART_OF
    source: Building
    target: Campus
    description: "Building belongs to a campus."
  - relation: CONTAINS
    source: Building
    target: Floor
    description: "Building contains a floor."
  - relation: CONTAINS
    source: Floor
    target: Space
    description: "Floor contains a space."
  - relation: LOCATED_IN
    source: Equipment
    target: Space
    description: "Equipment is installed in or serves a space."
  - relation: BELONGS_TO_SYSTEM
    source: Equipment
    target: System
    description: "Equipment belongs to a building subsystem."
  - relation: CONNECTED_TO
    source: Equipment
    target: Equipment
    description: "Equipment has a physical, electrical, hydraulic, airflow, network, or control connection to another equipment."
  - relation: FEEDS
    source: Equipment
    target: Space
    description: "Equipment provides power, air, water, cooling, heating, or service to a space."
  - relation: POWERS
    source: Equipment
    target: Equipment
    description: "Electrical equipment powers another equipment."
  - relation: CONTROLS
    source: Equipment
    target: Equipment
    description: "Controller or actuator controls target equipment."
  - relation: HAS_POINT
    source: Equipment
    target: Point
    description: "Equipment exposes telemetry, command, status, sensor, meter, or alarm point."
  - relation: MEASURES
    source: Point
    target: Metric
    description: "Point measures or reports a metric."
  - relation: OBSERVED_IN
    source: FaultEvent
    target: Point
    description: "Fault or alarm is observed through a point."
  - relation: AFFECTS
    source: FaultEvent
    target: Equipment
    description: "Fault affects equipment."
  - relation: AFFECTS
    source: FaultEvent
    target: Space
    description: "Fault affects a space or area."
  - relation: CAUSED_BY
    source: FaultEvent
    target: RootCause
    description: "Fault is caused by a root cause or direct cause."
  - relation: EVIDENCED_BY
    source: RootCause
    target: Point
    description: "Root cause is supported by point readings, alarms, or observed signals."
  - relation: RESOLVED_BY
    source: FaultEvent
    target: Procedure
    description: "Fault can be resolved by a procedure."
  - relation: GENERATED_WORK_ORDER
    source: FaultEvent
    target: WorkOrder
    description: "Fault generated or should generate a work order."
  - relation: ASSIGNED_TO
    source: WorkOrder
    target: Role
    description: "Work order is assigned to a role or team."
  - relation: DEFINES
    source: Standard
    target: Rule
    description: "Standard, paper, or reference defines a modeling or reasoning rule."
  - relation: VALIDATED_BY
    source: Rule
    target: Dataset
    description: "Rule or model can be validated using a dataset."
  - relation: TRIGGERS
    source: Rule
    target: AgentAction
    description: "Rule triggers a Pi-Agent action or workflow."
  - relation: PRODUCES_CANDIDATE
    source: AgentAction
    target: CandidateBatch
    description: "Agent extraction action produces a candidate batch."
  - relation: REVIEWS_CANDIDATE
    source: AgentAction
    target: CandidateBatch
    description: "Agent review action accepts, rejects, edits, or enriches a candidate batch."
  - relation: COMMITS_TO_GRAPH
    source: CandidateBatch
    target: GraphWorkspace
    description: "Approved candidate batch is committed into the governed graph workspace."
  - relation: QUERIES_GRAPH
    source: AgentAction
    target: GraphWorkspace
    description: "Agent query or diagnosis action reads from the graph workspace."

instructions: |
  Extract a smart campus graph across four layers:
  1. Dynamic sensing layer: time-series points, alarms, meter readings, BMS/EMS/IoT states.
  2. Physical skeleton layer: campus/building/floor/space, equipment, systems, topology, feeds, powers, controls.
  3. Business experience layer: manuals, SOPs, work orders, maintenance cases, failure chains, response procedures.
  4. Standard prior layer: Brick Schema, RealEstateCore, Haystack, ASHRAE, FDD papers, public datasets and reusable rules.

  Prefer named, auditable entities with IDs, tags, source fields, units, timestamps, or locations when present.
  Keep spatial containment separate from service topology: CONTAINS/PART_OF describes where things are; FEEDS/POWERS/CONTROLS/CONNECTED_TO describes how systems interact.
  Convert fault descriptions into FaultEvent -> CAUSED_BY -> RootCause and FaultEvent -> RESOLVED_BY -> Procedure chains when evidence exists.
  Extract AgentAction only when the text describes an operational step, workflow, graph operation, extraction, review, commit, query, or diagnosis action.
  Use CandidateBatch and GraphWorkspace for Pi-Agent native graph-building workflows: extraction -> candidate review -> graph commit -> graph QA.
  Do not invent topology or causality that is not stated or strongly implied by the source.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
