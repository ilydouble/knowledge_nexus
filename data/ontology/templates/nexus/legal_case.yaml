schema: nexus-v1
name: legal_case
type: graph
version: "1.0"
tags: [legal, case, citation, judgment, court, statute]
language: [en, zh]
description:
  en: "Legal documents — court judgments, case citations, compliance reports, legal opinions, statutes."
  zh: "法律文件 — 法院判决书、判例引用、合规报告、法律意见书、法规条文。"

concepts:
  - type: Case
    description: "Named legal case (e.g. 'Smith v. Jones [2023]', '某某公司诉某某案（2024）'). NOT generic 'the case'."
  - type: Court
    description: "Named adjudicating court or tribunal (e.g. 'Supreme Court', '北京市高级人民法院')."
  - type: Party
    description: "Named party in litigation (e.g. 'Plaintiff ABC Corp', 'Defendant John Smith', '被告方')."
  - type: LegalProvision
    description: "Named statute, regulation, or contractual clause (e.g. 'Article 15 Companies Act', '合同法第52条')."
  - type: LegalConcept
    description: "Named legal doctrine or principle at issue (e.g. 'duty of care', 'force majeure', '无效合同')."
  - type: KeyFact
    description: "Material fact established in the judgment (e.g. 'delivery date was March 5', '被告未履行告知义务')."
  - type: Outcome
    description: "Named judicial outcome or relief granted (e.g. 'damages awarded £500,000', '撤销原判', 'injunction granted')."

relations:
  - relation: CITES
    source: Case
    target: Case
    description: "Case relies on or references another case as precedent"
  - relation: OVERRULES
    source: Case
    target: Case
    description: "Case explicitly overturns the authority of the cited case"
  - relation: DISTINGUISHED_FROM
    source: Case
    target: Case
    description: "Case is factually distinguished from a prior case"
  - relation: DECIDED_BY
    source: Case
    target: Court
    description: "Case was adjudicated by this court"
  - relation: INVOLVES
    source: Case
    target: Party
    description: "Case includes this party as plaintiff, defendant, or intervener"
  - relation: APPLIES
    source: Case
    target: LegalProvision
    description: "Court applied or interpreted this statute or clause in the judgment"
  - relation: INTERPRETS
    source: Case
    target: LegalConcept
    description: "Case provides authoritative interpretation of this legal concept"
  - relation: ESTABLISHES
    source: Case
    target: KeyFact
    description: "Court found or established this fact as proven"
  - relation: RESULTS_IN
    source: Case
    target: Outcome
    description: "Case concluded with this ruling or relief"

instructions: |
  Focus on: case name and citation, parties, court, applicable statutes, ratio decidendi,
  case citations (which cases are cited and how), and final orders/outcome.
  LegalProvision: always include the article/section number (e.g. 'Article 52 Contract Law').
  KeyFact: extract only facts the court explicitly found proven — not allegations.
  Case citations: use CITES for neutral reference, OVERRULES only if explicitly stated,
  DISTINGUISHED_FROM only if the judgment explicitly distinguishes the cases.
  Do NOT extract judge names or lawyer names as Party — only named litigant entities.
  Do NOT extract procedural steps as KeyFact (e.g. 'plaintiff filed complaint' is not a KeyFact).

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
