schema: nexus-v1
name: tcm_text
type: graph
version: "1.0"
tags: [tcm, herb, meridian, formula, syndrome, acupuncture]
language: [zh, en]
description:
  en: "Traditional Chinese Medicine texts — herb monographs, formula books, acupuncture manuals, clinical case records."
  zh: "中医文献 — 本草著作、方剂书、针灸手册、医案。"

concepts:
  - type: Herb
    description: "Named medicinal herb (e.g. '黄芪', '当归', 'Astragalus'). NOT compound formulas."
  - type: Formula
    description: "Named TCM formula or prescription (e.g. '桂枝汤', '六味地黄丸'). NOT individual herbs."
  - type: Syndrome
    description: "Named TCM syndrome or pattern (e.g. '太阳中风', '气虚血瘀', 'Qi Deficiency')."
  - type: Symptom
    description: "Named clinical manifestation (e.g. '发热', '脉浮', 'floating pulse', '自汗')."
  - type: Meridian
    description: "Named meridian or acupuncture channel (e.g. '手太阴肺经', 'Lung Meridian')."
  - type: Acupoint
    description: "Named acupuncture point (e.g. '足三里 ST36', '合谷 LI4')."
  - type: TreatmentPrinciple
    description: "Named TCM therapeutic approach (e.g. '解肌发表', '调和营卫', 'tonify Qi')."

relations:
  - relation: CONTAINS_HERB
    source: Formula
    target: Herb
    description: "Formula contains this herb as an ingredient"
  - relation: SOVEREIGN_HERB
    source: Formula
    target: Herb
    description: "Herb serves as the principal (君药) herb in this formula"
  - relation: TREATS_SYNDROME
    source: Formula
    target: Syndrome
    description: "Formula is indicated for treating this TCM syndrome"
  - relation: COMPATIBLE_WITH
    source: Herb
    target: Herb
    description: "Herbs have a synergistic or mutually enhancing compatibility (相须/相使)"
  - relation: INCOMPATIBLE_WITH
    source: Herb
    target: Herb
    description: "Herbs are antagonistic or contraindicated together (相反/相恶)"
  - relation: MANIFESTS_SYNDROME
    source: Symptom
    target: Syndrome
    description: "Symptom cluster indicates this syndrome pattern"
  - relation: LOCATED_ON
    source: Acupoint
    target: Meridian
    description: "Acupoint is located on this meridian channel"
  - relation: GOVERNS
    source: Meridian
    target: Meridian
    description: "Meridian connects to or governs another via interior-exterior pairing (表里)"
  - relation: APPLIES_PRINCIPLE
    source: Formula
    target: TreatmentPrinciple
    description: "Formula embodies this TCM treatment principle"

instructions: |
  Focus on: herb properties (nature/flavor/meridian entry), formula compositions and compatibility,
  syndrome-symptom patterns, acupoint-meridian relationships.
  SOVEREIGN_HERB relation should only be used when the herb's role (君/臣/佐/使) is explicitly stated.
  Herb compatibility: use COMPATIBLE_WITH for positive pairings, INCOMPATIBLE_WITH for forbidden ones.
  Do NOT extract generic TCM theory terms (like '阴阳', '五行') as Syndrome or Symptom entities
  unless they describe a specific diagnosable pattern in the current text.
  Symptoms listed as a cluster leading to a syndrome should all be linked via MANIFESTS_SYNDROME.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
