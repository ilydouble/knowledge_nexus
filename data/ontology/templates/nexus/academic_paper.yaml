schema: nexus-v1
name: academic_paper
type: graph
version: "1.0"
tags: [research, academic, science]
language: [en, zh]
description:
  en: "Academic papers, research articles, conference papers, theses — focus on contributions, methods, datasets, and results."
  zh: "学术论文、研究文章、会议论文、学位论文 — 聚焦贡献、方法、数据集和结果。"

concepts:
  - type: Researcher
    description: "Named author or researcher (e.g. 'Yann LeCun'). NOT institutions or generic roles like 'scientist'."
  - type: Institution
    description: "University, lab, or company affiliation (e.g. 'MIT', 'Google Brain'). NOT persons."
  - type: Method
    description: "Specific algorithm, model, or technique (e.g. 'BERT', 'ResNet-50'). NOT generic terms like 'deep learning'."
  - type: Dataset
    description: "Named dataset for training or evaluation (e.g. 'ImageNet', 'SQuAD', 'COCO')."
  - type: Metric
    description: "Quantitative performance measure WITH its value (e.g. 'accuracy 94.2%', 'BLEU 32.1'). Omit if no value given."
  - type: Concept
    description: "Core research topic being studied (e.g. 'transfer learning'). NOT method names which belong to Method."
  - type: Task
    description: "ML/AI task or problem being solved (e.g. 'sentiment analysis', 'image segmentation')."

relations:
  - relation: AUTHORED_BY
    source: Paper
    target: Researcher
    description: "Paper written by this researcher"
  - relation: AFFILIATED_WITH
    source: Researcher
    target: Institution
    description: "Researcher's institutional affiliation"
  - relation: PROPOSES
    source: Paper
    target: Method
    description: "Paper introduces or proposes this method as its contribution"
  - relation: EVALUATES_ON
    source: Method
    target: Dataset
    description: "Method is tested or benchmarked on this dataset"
  - relation: ACHIEVES
    source: Method
    target: Metric
    description: "Method attains this performance metric"
  - relation: BUILDS_ON
    source: Method
    target: Method
    description: "Method extends or modifies a prior method"
  - relation: ADDRESSES
    source: Paper
    target: Task
    description: "Paper targets this task or problem"
  - relation: CITES
    source: Paper
    target: Method
    description: "Paper references an existing method from prior work"

instructions: |
  Focus on: Abstract (research question & contribution), Methods section (proposed techniques),
  Experiments (datasets, baselines, metrics with numbers), Results (performance), Conclusion (claims).
  Do NOT treat section headings or chapter titles as entities.
  Do NOT extract 'deep learning', 'neural network' as Concepts unless they ARE the main contribution.
  Metrics must include actual numeric values.

identifiers:
  entity_id: "{type}_{label}"
  relation_id: "{source}|{relation}|{target}"
